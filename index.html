<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome - Katie Melynda Loeb</title>
  <meta name="description" content="Katie Melynda Loeb — author, bartender, columnist, consultant, mixologist, sommelier. March 4, 1961 – December 8, 2018.">
  <meta property="og:locale" content="en_US">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Welcome - Katie Melynda Loeb">
  <meta property="og:description" content="March 4, 1961 – December 8, 2018 [Rest In Peace]">
  <meta property="og:site_name" content="Katie Melynda Loeb">
  <meta property="og:image" content="images/katie-loeb-website-photo.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="wp-content/uploads/2018/12/cropped-cropped-martini-favicon1-32x32.png" sizes="32x32">
  <link rel="icon" href="wp-content/uploads/2018/12/cropped-cropped-martini-favicon1-192x192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="wp-content/uploads/2018/12/cropped-cropped-martini-favicon1-180x180.png">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400;500&family=Dosis:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    .page-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .bg-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      z-index: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.45) 0%,
        rgba(0, 0, 0, 0.10) 35%,
        rgba(0, 0, 0, 0.10) 65%,
        rgba(0, 0, 0, 0.50) 100%
      );
      z-index: 1;
    }

    header, main, footer {
      position: relative;
      z-index: 2;
    }

    header {
      padding: 2rem 2.5rem;
    }

    .site-title {
      font-family: 'Great Vibes', cursive;
      font-size: 2.8rem;
      font-weight: 400;
      color: #fff;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.6);
      line-height: 1.1;
    }

    .site-title a {
      color: inherit;
      text-decoration: none;
    }

    .site-description {
      font-family: 'Dosis', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: rgba(255,255,255,0.85);
      text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
      letter-spacing: 0.08em;
      margin-top: 0.3rem;
    }

    main {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 1rem;
    }

    .memorial-text {
      text-align: center;
      color: #fff;
      text-shadow: 1px 2px 8px rgba(0,0,0,0.7);
    }

    .memorial-text .dates {
      font-family: 'Quicksand', sans-serif;
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .memorial-text .rip-link {
      display: block;
      margin-top: 0.4rem;
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.06em;
    }

    .memorial-text .rip-link a {
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.4);
      transition: border-color 0.2s;
    }

    .memorial-text .rip-link a:hover {
      border-color: #fff;
    }

    footer {
      padding: 0.8rem 2.5rem;
      text-align: center;
    }

    .footer-credits {
      font-family: 'Dosis', sans-serif;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }

    .footer-credits a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
    }

    @media (max-width: 440px) {
      header {
        padding: 2rem 0;
        text-align: center;
      }
    }

    @media (max-width: 410px) {
      .site-description .subhead-part2 {
        display: block;
        margin-top: 0.2em;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <img class="bg-photo"
         src="images/katie-loeb-website-photo.png"
         alt="Katie Melynda Loeb holding a cocktail"
         fetchpriority="high"
         decoding="async">
    <div class="overlay"></div>

    <header>
      <h1 class="site-title"><a href="index.html">Katie Melynda Loeb</a></h1>
      <p class="site-description"><span class="subhead-part1">author, bartender, columnist,</span> <span class="subhead-part2">consultant, mixologist, sommelier.</span></p>
    </header>

    <main>
      <div class="memorial-text">
        <p class="dates">March 4, 1961 &#8211; December 8, 2018</p>
        <p class="rip-link">[<a href="rest-in-peace/">Rest In Peace</a>]</p>
      </div>
    </main>

    <footer>
      <p class="footer-credits">&copy; 2026 Katie Melynda Loeb</p>
    </footer>
  </div>
</body>
</html>
